# conf/finetune_olmo2.conf — SFT finetune of the borrowed OLMo-2-7B base.
#
# Pipeline (all gated behind the new flags; pretraining paths untouched):
#   - finetune_from : non-strict load of the converted base olmo2_7b.pt. The base
#                     has num_mtp_heads=0; this model is built with num_mtp_heads=3,
#                     so the 3 fresh MTP heads stay at init and TRAIN this run
#                     (self-speculative-decoding retrofit).
#   - sft_mask_path : assistant-only loss mask from scripts/prep_sft_data.py, so CE
#                     trains only on assistant tokens. REQUIRES gpu_data=0.
#   - dora=1        : DoRA adapters (see olmo_cpp/model/dora.hpp). NOTE: the DoRA
#                     module is provided but its forward-swap into attention/FFN is
#                     not yet wired (see report). With dora=0 this is a full-param
#                     SFT (run on 2x H100 + FSDP, or one H100 with 8-bit Adam).
#
# Build:  data + base + mask on the volume.
# Launch: ./build/olmo_train conf/finetune_olmo2.conf          (1 GPU)
#         ./scripts/launch_multigpu.sh conf/finetune_olmo2.conf 2   (2 GPU, full SFT)

[model]
d_model				4096
vocab_size			100352
n_layers			32
n_heads				32
n_kv_heads			32
head_dim			128
rope_theta			500000
layer_norm_eps			1e-6
init_std			0.02
use_qk_norm			1
use_head_qk_norm		0
use_embedding_norm		0		# OLMo-2 feeds raw embeddings (must be 0)
hidden_size_multiple_of		256
hidden_size_multiplier		1.0
block_type			reordered_norm
attention_backend		sdpa
layer_norm_type			rms_norm
num_mtp_heads			2		# retrofit: fresh MTP heads train this run (2 to save mem)
mtp_loss_weight			0.1
# Recompute block activations in backward (trade compute for memory) so the 7B
# finetune fits one 80GB H100 at seq 2048.
activation_checkpoint_mode	full
activation_checkpoint_interval	1

[training]
steps				3000		# longer than the 2000-step run (loss reached ~1.5) to push lower
						# (cosine over 4000 re-warms the LR from the resumed step -> sustained learning)
batch_size			1		# 7B + 4 lm-heads(100k vocab) + seq2048 acts -> batch 1 to fit 80GB
seq_len				2048
lr				3.0e-4		# DoRA LR: adapters are random low-rank, need ~1e-4-3e-4 (not full-ft 1e-5)
warmup_steps			100
grad_accum			16		# effective batch = 16
optimizer			adamw
scheduler			cosine
weight_decay			0.0
max_grad_norm			1.0
bf16				1
amp				0
grad_scaler			0
log_interval			10

# Finetune wiring (volume paths)
finetune_from			/media/volume/Prep_and_Voice_Training/olmo2-7b/olmo2_7b.pt
sft_mask_path			/media/volume/Prep_and_Voice_Training/sft/sft_mask.npy
dora				1		# DoRA wired: base frozen, only adapters + MTP heads train (fits 1 H100)
dora_rank			32
dora_alpha			64.0

save				/media/volume/Prep_and_Voice_Training/runs/sft_olmo2_v5/model.pt
checkpoint_dir			/media/volume/Prep_and_Voice_Training/runs/sft_olmo2_v5/checkpoints
checkpoint_interval		500
keep_checkpoints		2
resume				1
heartbeat_path			/media/volume/Prep_and_Voice_Training/runs/sft_olmo2_v5/heartbeat.txt

[optimization]
fused				0		# standard Transformer (resume + non-strict load path)
foreach_optimizer		1
gpu_data			0		# REQUIRED for the SFT loss mask (CPU batch path)
cuda_graph			0
zero1				0
fsdp				0		# set 1 (+ launch_multigpu 2) for full-param 7B SFT

[data]
data_path			/media/volume/Prep_and_Voice_Training/sft/sft_tokens.npy
bpe_vocab			/media/volume/Prep_and_Voice_Training/olmo2-tok/vocab.json

[device]
device				cpu
